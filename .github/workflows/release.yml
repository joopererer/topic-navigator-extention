# Builds extension zips when you push a version tag like v1.0.1, then attaches them to a GitHub Release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Build dist + dist-firefox
        run: npm run build:firefox

      - name: Zip Chromium bundle (Chrome / Edge — load unpacked from extracted folder)
        run: cd dist && zip -r "../topic-navigator-chromium-${{ github.ref_name }}.zip" .

      - name: Zip Firefox bundle
        run: cd dist-firefox && zip -r "../topic-navigator-firefox-${{ github.ref_name }}.zip" .

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            topic-navigator-chromium-${{ github.ref_name }}.zip
            topic-navigator-firefox-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
